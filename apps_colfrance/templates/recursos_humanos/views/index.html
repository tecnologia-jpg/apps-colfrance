<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Certificados Colfrance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Nuevo Encabezado */
        .header-section { 
            background: linear-gradient(135deg, #0135e3 0%, #010fa8 100%); 
            color: white; padding: 3rem 1.5rem; border-radius: 0 0 1.5rem 1.5rem; margin-bottom: 2.5rem; 
        }
        
        /* Nuevas Tarjetas */
        .exam-card { 
            border: 1px solid #e2e8f0; border-radius: 1rem; transition: 0.2s; background: white; padding: 2rem; 
        }
        .exam-card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.05); transform: translateY(-3px); }
        
        /* Icono Naranja/Rosa */
        .icon-circle { 
            background: linear-gradient(135deg, #fe8e5a 0%, #f9436e 100%); 
            width: 3.5rem; height: 3.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            margin: 0 auto 1rem; color: white; font-size: 1.5rem; 
        }
        
        /* Botón Azul */
        .btn-gradient { 
            background: linear-gradient(90deg, #0135e3 0%, #010fa8 100%); 
            color: white; border-radius: 9999px; padding: 0.5rem 1.5rem; font-weight: 600; border: none; transition: 0.2s; 
        }
        .btn-gradient:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>

<div class="header-section text-center shadow-sm">
    <h1 class="fw-bold"><i class="fas fa-clipboard-check me-2"></i>Generador de Certificados Colfrance</h1>
    <p class="text-white-50 mt-2 text-sm">Seleccione la evaluación técnica que desea realizar.</p>
</div>

<div class="container mb-5">
    <div class="row justify-content-center g-4">
        
        {% for examen in examenes %}
        <div class="col-md-5">
            <div class="exam-card text-center h-100">
                <div class="icon-circle">
                    <i class="fas fa-clipboard-check"></i>
                </div>
                <h3 class="fw-bold text-dark fs-5 mb-2">{{ examen.nombre }}</h3>
                <p class="text-muted small mb-4">
                    Puntaje mínimo para aprobar: <strong class="text-dark">{{ examen.puntaje_minimo }}</strong>
                </p>
                <a href="{% url 'tomar_examen' examen.id %}" class="btn btn-gradient text-decoration-none d-inline-block">
                    Ingresar al examen
                </a>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
            <h4 class="text-muted">No hay exámenes disponibles.</h4>
        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
